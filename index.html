body{background:#07091a;color:#e8eaf0;font-family:Barlow,sans-serif;min-height:100vh}
button{cursor:pointer;font-family:Barlow,sans-serif}
select{background:#0a0e1a;border:1px solid #1c2540;color:#c8d0e8;padding:5px 8px;border-radius:4px;width:100%;font-size:12px;outline:none}
select option{background:#0e1325}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#07091a}::-webkit-scrollbar-thumb{background:#1c2540;border-radius:3px}
.hdr{background:#080b1a;border-bottom:1px solid #1c2540;padding:0 16px}
.hdr-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;padding:12px 0;gap:14px}
.hdr-title{font-family:'Bebas Neue',serif;font-size:22px;letter-spacing:4px;color:#fff;line-height:1}
.hdr-sub{font-size:11px;color:#7080a0;letter-spacing:1px;margin-top:2px}
.tabs{background:#080b1a;border-bottom:1px solid #1c2540}
.tabs-inner{max-width:900px;margin:0 auto;display:flex}
.tab-btn{padding:10px 20px;border:none;background:transparent;color:#7080a0;font-family:'Bebas Neue',serif;font-size:15px;letter-spacing:2px;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#c9a227;border-bottom-color:#c9a227}
.content{max-width:900px;margin:0 auto;padding:16px}
.admin-btn{background:transparent;border:1px solid #1c2540;border-radius:6px;padding:6px 12px;color:#7080a0;font-size:12px;letter-spacing:1px}
.scoreboard{background:linear-gradient(135deg,#7f0e1e 0%,#07091a 45%,#07091a 55%,#051d5a 100%);border:1px solid #1c2540;border-radius:12px;padding:24px 20px;margin-bottom:20px}
.score-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;text-align:center}
.score-label{font-family:'Bebas Neue',serif;font-size:15px;letter-spacing:3px;margin-bottom:4px}
.score-num{font-family:'Bebas Neue',serif;font-size:72px;line-height:1}
.progress-bar{margin:12px 0 0}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;color:#7080a0;letter-spacing:1px}
.progress-track{height:8px;border-radius:4px;background:#1a2040;overflow:hidden;display:flex}
.match-card{background:#0e1325;border:1px solid #1c2540;border-radius:8px;padding:10px 14px;margin-bottom:8px}
.match-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.match-badge{background:#1c2540;color:#7080a0;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;letter-spacing:1px}
.result-badge{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff}
.match-players{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.match-vs{color:#7080a0;font-size:14px;letter-spacing:2px;font-weight:700}
.round-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.round-title{font-family:'Bebas Neue',serif;color:#c9a227;font-size:18px;letter-spacing:2px}
.standings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.standings-hdr{display:grid;grid-template-columns:22px 1fr 40px 40px 50px;gap:6px;padding:6px 10px;margin-bottom:4px;border-bottom:1px solid #1c2540}
.standings-row{display:grid;grid-template-columns:22px 1fr 40px 40px 50px;gap:6px;align-items:center;padding:7px 10px;border-radius:6px;border-left:3px solid transparent}
.standings-row.even{background:transparent}
.standings-row.odd{background:#ffffff06}
.day-tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.day-btn{padding:8px 16px;border-radius:6px;border:none;font-family:'Bebas Neue',serif;letter-spacing:2px;font-size:14px;background:transparent;color:#7080a0;transition:all .2s}
.day-btn.active{background:#c9a227;color:#000}
.locked-msg{text-align:center;padding:60px 20px;color:#7080a0;border:1px dashed #1c2540;border-radius:12px}
.overlay{position:fixed;inset:0;background:#000c;z-index:1000;display:flex;align-items:center;justify-content:center}
.overlay.hidden{display:none}
.modal{background:#0e1325;border:2px solid #c9a227;border-radius:12px;padding:32px;min-width:300px;text-align:center}
.admin-panel{position:fixed;inset:0;background:#000d;z-index:1000;overflow-y:auto}
.admin-panel.hidden{display:none}
.panel-inner{max-width:700px;margin:0 auto;padding:16px}
.panel-box{background:#0e1325;border:1px solid #c9a227;border-radius:12px;padding:20px}
.release-box{background:#0a0e20;border:1px solid #c9a22744;border-radius:8px;padding:12px 16px;margin-bottom:16px}
.footer{border-top:1px solid #1c2540;margin-top:40px;padding:16px;text-align:center;color:#7080a0;font-size:11px;letter-spacing:1px}
.live-indicator{color:#22c55e;font-size:10px}
#winner-banner{display:none;text-align:center;margin-bottom:8px;color:#c9a227;font-family:'Bebas Neue',serif;font-size:20px;letter-spacing:3px}

</div>

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function fmtPts(v){ return v%1===0 ? String(v) : v.toFixed(1); }

function getMatch(base, id){
  var m = base.filter(function(x){return x.id===id;})[0];
  if(!m) return null;
  var ov = state.pairings[id];
  if(!ov) return m;
  return {id:m.id,d:m.d,r:m.r,m:m.m,c:m.c, am:ov.am||m.am, eu:ov.eu||m.eu};
}

function calcScores(){
  var amT=0, euT=0, pp={};
  AM.concat(EU).forEach(function(p){ pp[p]={s:0,d:0,total:0}; });
  function add(players, pts, t){
    (Array.isArray(players)?players:[players]).forEach(function(p){
      if(pp[p]){ pp[p][t]+=pts; pp[p].total+=pts; }
    });
  }
  SINGLES.forEach(function(m){
    var res=state.results[m.id]; if(!res) return;
    var am=(state.pairings[m.id]&&state.pairings[m.id].am)||m.am;
    var eu=(state.pairings[m.id]&&state.pairings[m.id].eu)||m.eu;
    if(res==='A'){amT+=1;add(am,1,'s');}else if(res==='E'){euT+=1;add(eu,1,'s');}else{amT+=.5;euT+=.5;add(am,.5,'s');add(eu,.5,'s');}
  });
  DOUBLES.forEach(function(m){
    var res=state.results[m.id]; if(!res) return;
    var am=(state.pairings[m.id]&&state.pairings[m.id].am)||m.am;
    var eu=(state.pairings[m.id]&&state.pairings[m.id].eu)||m.eu;
    if(res==='A'){amT+=1;add(am,1,'d');}else if(res==='E'){euT+=1;add(eu,1,'d');}else{amT+=.5;euT+=.5;add(am,.5,'d');add(eu,.5,'d');}
  });
  return {amT:amT, euT:euT, pp:pp};
}

function badge(res){
  if(!res) return '<span style="color:#7080a0;font-size:11px">—</span>';
  var cfg={A:{l:'AM',bg:'#b91c2e'},E:{l:'EU',bg:'#0a3180'},D:{l:'½',bg:'#f59e0b'}};
  var c=cfg[res]||{l:res,bg:'#444'};
  return '<span class="result-badge" style="background:'+c.bg+'">'+c.l+'</span>';
}

function matchCard(m, result, isD){
  var amN = isD ? m.am.join(' / ') : m.am;
  var euN = isD ? m.eu.join(' / ') : m.eu;
  var amColor = result==='A'?'#e05060':'#e8eaf0';
  var euColor = result==='E'?'#2a5ec0':'#e8eaf0';
  var amW = result==='A'?'700':'400';
  var euW = result==='E'?'700':'400';
  return '<div class="match-card">'+
    '<div class="match-meta">'+
      '<span class="match-badge">'+(isD?'DBL':'SGL')+' · M'+m.m+' · Ct.'+m.c+'</span>'+
      badge(result)+
    '</div>'+
    '<div class="match-players">'+
      '<span style="color:'+amColor+';font-weight:'+amW+';font-size:13px;text-align:right">'+amN+'</span>'+
      '<span class="match-vs">VS</span>'+
      '<span style="color:'+euColor+';font-weight:'+euW+';font-size:13px">'+euN+'</span>'+
    '</div>'+
  '</div>';
}

// RENDER

function render(){ renderLive(); renderSchedule(); renderStandings(); }

function renderLive(){
  var sc=calcScores();
  var amT=sc.amT, euT=sc.euT;
  var aP=Math.min(90,(amT/55)*100), eP=Math.min(90,(euT/55)*100);
  var winner = amT>=55?'AMERICAS':euT>=55?'EUROPE':null;
  var all=SINGLES.concat(DOUBLES);
  var pending=all.filter(function(m){return !state.results[m.id];});
  var curR=pending.length>0?Math.min.apply(null,pending.map(function(m){return m.r;})):6;
  var cS=SINGLES.filter(function(m){return m.r===curR;});
  var cD=DOUBLES.filter(function(m){return m.r===curR;});

  var html='<div class="scoreboard">';
  if(winner) html+='<div id="winner-banner" style="display:block">🏆 '+winner+' WINS THE SHUFFLE CUP!</div>';
  html+='<div class="score-grid">'+
    '<div>'+
      '<div class="score-label" style="color:#e05060">AMERICAS</div>'+
      '<div class="score-num" style="color:'+(amT>=55?'#c9a227':'#fff')+';text-shadow:0 0 30px #b91c2e88">'+fmtPts(amT)+'</div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px">'+
      '<div style="color:#7080a0;font-size:10px;letter-spacing:2px;font-weight:700">VS</div>'+
    '</div>'+
    '<div>'+
      '<div class="score-label" style="color:#2a5ec0">EUROPE</div>'+
      '<div class="score-num" style="color:'+(euT>=55?'#c9a227':'#fff')+';text-shadow:0 0 30px #0a318088">'+fmtPts(euT)+'</div>'+
    '</div>'+
  '</div>'+
  '<div class="progress-bar">'+
    '<div class="progress-labels"><span>AMERICAS '+amT+'pts</span><span style="color:#c9a227">FIRST TO 55 WINS</span><span>EUROPE '+euT+'pts</span></div>'+
    '<div class="progress-track">'+
      '<div style="width:'+aP+'%;background:linear-gradient(90deg,#7f0e1e,#b91c2e);transition:width .6s"></div>'+
      '<div style="flex:1"></div>'+
      '<div style="width:'+eP+'%;background:linear-gradient(90deg,#0a3180,#2a5ec0);transition:width .6s"></div>'+
    '</div>'+
  '</div></div>';

  var rdLive=state.releasedDays!=null?state.releasedDays:1;
  if(rdLive===0){
    html+='<div class="locked-msg"><div style="font-size:32px;margin-bottom:12px">🔒</div>'+
      '<div style="font-family:\'Bebas Neue\',serif;font-size:20px;letter-spacing:3px;margin-bottom:8px">PAIRINGS NOT YET RELEASED</div>'+
      '<div style="font-size:13px">The matchups will be announced by the organizers.</div></div>';
  } else {
    html+='<div style="font-family:\'Bebas Neue\',serif;font-size:14px;color:#7080a0;letter-spacing:2px;margin-bottom:12px">CURRENT ROUNDS</div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
    html+='<div><div style="font-family:\'Bebas Neue\',serif;font-size:16px;color:#c9a227;letter-spacing:2px;margin-bottom:8px">ROUND '+curR+' · SINGLES</div>';
    cS.forEach(function(m){ html+=matchCard(getMatch(SINGLES,m.id),state.results[m.id],false); });
    html+='</div><div><div style="font-family:\'Bebas Neue\',serif;font-size:16px;color:#c9a227;letter-spacing:2px;margin-bottom:8px">ROUND '+curR+' · DOUBLES</div>';
    cD.forEach(function(m){ html+=matchCard(getMatch(DOUBLES,m.id),state.results[m.id],true); });
    html+='</div></div>';
  }
  document.getElementById('view-live').innerHTML=html;
}

var schedDay=1, schedType='Singles';
function renderSchedule(){
  var rd=state.releasedDays!=null?state.releasedDays:1;
  var released=schedDay<=rd;
  var base=schedType==='Singles'?SINGLES:DOUBLES;
  var matches=base.filter(function(m){return m.d===schedDay;});
  var roundNums=[]; matches.forEach(function(m){if(roundNums.indexOf(m.r)<0)roundNums.push(m.r);});

  var html='<div class="day-tabs">';
  [1,2,3].forEach(function(d){
    html+='<button class="day-btn'+(schedDay===d?' active':'')+'" onclick="setSchedDay('+d+')">'+'DAY '+d+(d>rd?' 🔒':'')+'</button>';
  });
  html+='<div style="flex:1"></div>';
  ['Singles','Doubles'].forEach(function(t){
    html+='<button class="day-btn'+(schedType===t?' active':'')+'" onclick="setSchedType(\''+t+'\')">'+t+'</button>';
  });
  html+='</div>';

  if(!released){
    html+='<div class="locked-msg"><div style="font-size:32px;margin-bottom:12px">🔒</div>'+
      '<div style="font-family:\'Bebas Neue\',serif;font-size:20px;letter-spacing:3px;margin-bottom:8px">PAIRINGS NOT YET RELEASED</div>'+
      '<div style="font-size:13px">The matchups for Day '+schedDay+' will be announced by the organizers.</div></div>';
  } else {
    roundNums.forEach(function(rn){
      var rm=matches.filter(function(m){return m.r===rn;});
      var done=rm.filter(function(m){return state.results[m.id];}).length;
      html+='<div style="margin-bottom:20px">'+
        '<div class="round-hdr">'+
          '<div class="round-title">ROUND '+rn+'</div>'+
          '<div style="color:#7080a0;font-size:11px">'+done+'/'+rm.length+' completed</div>'+
          (done===rm.length&&done>0?'<span style="color:#22c55e;font-size:11px">✓ DONE</span>':'')+
        '</div>';
      rm.forEach(function(m){ html+=matchCard(getMatch(base,m.id),state.results[m.id],schedType==='Doubles'); });
      html+='</div>';
    });
  }
  document.getElementById('view-schedule').innerHTML=html;
}
function setSchedDay(d){ schedDay=d; renderSchedule(); }
function setSchedType(t){ schedType=t; renderSchedule(); }

function renderStandings(){
  var sc=calcScores();
  var pp=sc.pp;
  var sA=AM.slice().sort(function(a,b){return (pp[b]?pp[b].total:0)-(pp[a]?pp[a].total:0);});
  var sE=EU.slice().sort(function(a,b){return (pp[b]?pp[b].total:0)-(pp[a]?pp[a].total:0);});
  function col(players, clr){
    var h='<div class="standings-hdr">'+
      '<span></span>'+
      '<span style="font-family:\'Bebas Neue\',serif;font-size:14px;letter-spacing:2px;color:'+clr+'">'+(clr==='#e05060'?'AMERICAS':'EUROPE')+'</span>'+
      '<span style="text-align:center;font-size:10px;color:#7080a0;letter-spacing:1px">SGL</span>'+
      '<span style="text-align:center;font-size:10px;color:#7080a0;letter-spacing:1px">DBL</span>'+
      '<span style="text-align:center;font-size:10px;color:#7080a0;letter-spacing:1px">TOTAL</span></div>';
    players.forEach(function(p,i){
      var pts=pp[p]||{s:0,d:0,total:0};
      h+='<div class="standings-row '+(i%2===0?'even':'odd')+'" style="border-left-color:'+(pts.total>0?clr:'transparent')+'">'+
        '<span style="color:#7080a0;font-size:11px;text-align:center">'+(i+1)+'</span>'+
        '<span style="font-size:13px;color:'+(pts.total>0?'#e8eaf0':'#7080a0')+'">'+p+'</span>'+
        '<span style="text-align:center;font-size:12px;color:#7080a0">'+(pts.s||0)+'</span>'+
        '<span style="text-align:center;font-size:12px;color:#7080a0">'+(pts.d||0)+'</span>'+
        '<span style="text-align:center;font-size:14px;font-weight:700;color:'+(pts.total>0?clr:'#7080a0')+'">'+fmtPts(pts.total)+'</span>'+
      '</div>';
    });
    return h;
  }
  document.getElementById('view-standings').innerHTML=
    '<div class="standings-grid"><div>'+col(sA,'#e05060')+'</div><div>'+col(sE,'#2a5ec0')+'</div></div>';
}

      }
      function selEu(idx,val){
        return '<select onchange="setPairEu(\''+m.id+'\','+idx+',this.value,'+isD+')" style="'+selStyle+(idx>0?';margin-top:4px':'')+'">'+
          EU.map(function(p){return '<option'+(p===val?' selected':'')+'>'+p+'</option>';}).join('')+'</select>';
      }

      var amSel=isD?selAm(0,cA[0]||'')+selAm(1,cA[1]||''):selAm(0,typeof cA==='string'?cA:(cA[0]||''));
      var euSel=isD?selEu(0,cE[0]||'')+selEu(1,cE[1]||''):selEu(0,typeof cE==='string'?cE:(cE[0]||''));

      var resBtns=[['A','AM','#b91c2e'],['D','½','#f59e0b'],['E','EU','#0a3180']].map(function(arr){
        var act=res===arr[0];
        return '<button onclick="setRes(\''+m.id+'\',\''+arr[0]+'\')" style="padding:4px 12px;border-radius:4px;border:none;cursor:pointer;font-weight:700;font-size:12px;background:'+(act?arr[2]:'#1a2040')+';color:'+(act?'#fff':'#7080a0')+'">'+arr[1]+'</button>';
      }).join('');
      var clearBtn=res?'<button onclick="setRes(\'"+m.id+"\',\'\')" style="padding:4px 8px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:#7080a0;font-size:11px">clear</button>':'';

      mh+='<div style="background:#0a0e20;border:1px solid #1c2540;border-radius:8px;padding:10px 12px;margin-bottom:8px">'+
        '<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;margin-bottom:8px">'+
          '<div>'+amSel+'</div>'+
          '<span style="color:#7080a0;font-size:11px;letter-spacing:2px;align-self:center">vs</span>'+
          '<div>'+euSel+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          '<span style="color:#7080a0;font-size:11px;margin-right:4px">Result:</span>'+
          resBtns+clearBtn+
          '<span style="margin-left:auto;color:#7080a0;font-size:10px">Ct.'+m.c+' M'+m.m+'</span>'+
        '</div>'+
      '</div>';
    });
    mh+='</div>';
  });
  document.getElementById('admin-matches').innerHTML=mh;
}

function setReleasedDays(d){ adminLocal.releasedDays=d; renderAdmin(); }
function setAdminType(t){ adminType=t; renderAdmin(); }
function setAdminDay(d){ adminDay=d; renderAdmin(); }
function setRes(id,v){
  if(v) adminLocal.results[id]=v; else delete adminLocal.results[id];
  renderAdmin();
}
function setPairAm(id,idx,val,isD){
  if(!adminLocal.pairings[id]) adminLocal.pairings[id]={};
  var base=adminType==='Singles'?SINGLES:DOUBLES;
  var m=base.filter(function(x){return x.id===id;})[0];
  var cur=adminLocal.pairings[id].am||(isD?m.am.slice():m.am);
  if(isD){var a=Array.isArray(cur)?cur.slice():m.am.slice();a[idx]=val;adminLocal.pairings[id].am=a;}
  else{adminLocal.pairings[id].am=val;}
}
function setPairEu(id,idx,val,isD){
  if(!adminLocal.pairings[id]) adminLocal.pairings[id]={};
  var base=adminType==='Singles'?SINGLES:DOUBLES;
  var m=base.filter(function(x){return x.id===id;})[0];
  var cur=adminLocal.pairings[id].eu||(isD?m.eu.slice():m.eu);
  if(isD){var a=Array.isArray(cur)?cur.slice():m.eu.slice();a[idx]=val;adminLocal.pairings[id].eu=a;}
  else{adminLocal.pairings[id].eu=val;}
}

// Initial render
render();
</script>
